name: ci

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ lcov
          sudo apt-get install -y clang-format
          sudo apt-get install -y libspdlog-dev

      - name: Check formatting
        run: |
          chmod +x scripts/check_clang_format.sh
          ./scripts/check_clang_format.sh

      - name: Configure
        run: |
          cmake -S . -B build

      - name: Build
        run: |
          cmake --build build -j"$(nproc)"

      - name: Test
        run: |
          cd build
          ctest --output-on-failure

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ lcov
          sudo apt-get install -y clang-format
          sudo apt-get install -y libspdlog-dev

      - name: Run coverage
        run: |
          chmod +x scripts/run_coverage_ci.sh
          python3 --version
          ./scripts/run_coverage_ci.sh

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build-coverage/coverage-html

      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: build-coverage/coverage.filtered.info

  linux-deps-release:
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '%REBUILD_DEPS')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ git curl tar gh libintelrdfpmath-dev

      - name: Build Linux dependency bundle
        run: |
          chmod +x scripts/rebuild_linux_deps_ci.sh
          ./scripts/rebuild_linux_deps_ci.sh

      - name: Upload Linux dependency artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deps-ubuntu-latest
          path: dependencies/linux/linux-deps-ubuntu-latest.tar.gz

      - name: Create or update linux-deps release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view linux-deps >/dev/null 2>&1 || gh release create linux-deps --title "linux-deps" --notes "Latest reusable Linux dependency bundle for IBKR CI."
          gh release upload linux-deps dependencies/linux/linux-deps-ubuntu-latest.tar.gz --clobber

  ibkr-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make autoconf automake libtool pkg-config curl unzip gh libintelrdfpmath-dev

      - name: Restore or rebuild Linux dependency bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dependencies/linux
          if gh release download linux-deps -p 'linux-deps-ubuntu-latest.tar.gz' -D dependencies/linux; then
            echo "Using prebuilt linux-deps release asset"
          else
            echo "linux-deps release asset not found; rebuilding dependencies"
            chmod +x scripts/rebuild_linux_deps_ci.sh
            ./scripts/rebuild_linux_deps_ci.sh
            gh release view linux-deps >/dev/null 2>&1 || gh release create linux-deps --title "linux-deps" --notes "Latest reusable Linux dependency bundle for IBKR CI."
            gh release upload linux-deps dependencies/linux/linux-deps-ubuntu-latest.tar.gz --clobber
          fi
          tar -xzf dependencies/linux/linux-deps-ubuntu-latest.tar.gz -C .
          test -d dependencies/linux/install
          find dependencies/linux/install -maxdepth 2 -type f | sort | head -n 50 || true

      - name: Configure IBKR build
        run: |
          cmake -S . -B build-ibkr-ci -DHFT_ENABLE_IBKR=ON -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/dependencies/linux/install"

      - name: Build IBKR target
        run: |
          cmake --build build-ibkr-ci -j"$(nproc)"
