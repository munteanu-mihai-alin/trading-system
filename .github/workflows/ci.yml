name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ lcov
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          chmod +x scripts/check_clang_format.sh
          ./scripts/check_clang_format.sh

      - name: Configure
        run: |
          cmake -S . -B build

      - name: Build
        run: |
          cmake --build build -j"$(nproc)"

      - name: Test
        run: |
          cd build
          ctest --output-on-failure

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ lcov
          sudo apt-get install -y clang-format

      - name: Run coverage
        run: |
          chmod +x scripts/run_coverage_ci.sh
          python3 --version
          ./scripts/run_coverage_ci.sh

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build-coverage/coverage-html

      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: build-coverage/coverage.filtered.info


  ibkr-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make autoconf automake libtool pkg-config curl unzip

      - name: Install protobuf 29.3 from source
        run: |
          PROTOBUF_VERSION=29.3
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOBUF_VERSION}/protobuf-${PROTOBUF_VERSION}.tar.gz
          tar -xzf protobuf-${PROTOBUF_VERSION}.tar.gz
          cmake -S protobuf-${PROTOBUF_VERSION} -B protobuf-build \
            -Dprotobuf_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build protobuf-build -j"$(nproc)"
          sudo cmake --install protobuf-build
          sudo ldconfig

      - name: Show protobuf version
        run: |
          protoc --version
          test -f /usr/local/include/google/protobuf/runtime_version.h

      - name: Configure IBKR build
        run: |
          cmake -S . -B build-ibkr-ci -DHFT_ENABLE_IBKR=ON

      - name: Build IBKR target
        run: |
          cmake --build build-ibkr-ci -j"$(nproc)"
