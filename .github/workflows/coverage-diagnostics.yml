name: coverage-diagnostics

on:
  workflow_dispatch:
  push:
    paths:
      - 'CMakeLists.txt'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'CMakeLists.txt'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ lcov clang-format

      - name: Run CI coverage with branch diagnostics
        run: |
          chmod +x scripts/run_coverage_ci.sh
          python3 --version
          ./scripts/run_coverage_ci.sh

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-diagnostics
          path: build-coverage/coverage-html

      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov-diagnostics
          path: build-coverage/coverage.filtered.info
