[runtime]
# Full universe is 49 symbols (see include/models/symbol_universe.hpp).
# Universe_size caps the ranked set; top_k of those are routed at any time.
universe_size=49
top_k=3
# steps drives the engine.step(t) loop count. For a 5-day Mon-Fri MBP-10
# replay at the default broker indexing (one engine step per L2 update),
# ~1.7M steps/day * 5 = ~8.5M total. Tune down for shorter runs.
steps=8500000

[backtest_logging]
# Backtest-only decision trace. One CSV row per ranked symbol per buy event:
# step,decision_id,rank,symbol,score,score_tilt,hawkes_buy,hawkes_sell,
# hit_count,ou_mu,ou_initialized,mid,best_limit,active,chosen,gate.
# Leave empty to disable. Disabled by default in live configs.
decision_log_path=reports/decisions.csv
# Order lifecycle: one row per state change (placed/filled/cancelled/
# rejected) for both buys and sells. Schema:
#   step,order_id,symbol,side,qty,limit,event,filled_qty,remaining_qty,
#   avg_fill_price
# Realized PnL is derived from this at end-of-run; no separate fills.csv.
order_log_path=reports/orders.csv
# Per-engine-step ranking snapshot for all universe symbols. Same schema
# as decision_log_path. ~10-15 MB for a 4-6 day backtest.
step_trace_log_path=reports/step_trace.csv
# Per-step L2 trace for held positions. Schema:
#   step,symbol,best_bid,bid_size,best_ask,ask_size,microprice,
#   bid_vol_top10,ask_vol_top10,sell_limit,sell_score
# Sub-1 MB for a 6-day backtest with max_open_symbols=3.
l2_trace_log_path=reports/l2_trace.csv
# Truncate (default) is right for backtest: each backtest invocation
# gets fresh files inside its reports/runs/<run_id>/ folder. Use append
# for live where multiple sessions per day are expected.
log_append_mode=false
# Optional human-readable tag injected into the session_start /
# session_end comment lines. Empty -> uses the broker mode name.
run_label=cpp_backtest

[broker]
mode=databento_backtest
host=127.0.0.1
paper_port=0
live_port=0
client_id=1

[execution]
# Notional-driven sizing: target $500 per trade, $1500 account budget.
order_enabled=true
trade_notional=500
account_budget=1500
# Position-sizing rule. "equal" (default) or "score_weighted".
position_sizing_rule=equal
max_open_symbols=3
# Backtest does not need the synthetic shadow-portfolio simulation in
# RankingEngine; off keeps shadow_results.csv empty and avoids the
# placeholder cooldown sine-wave from biasing real-data ranking.
shadow_enabled=false
# Skip the synthetic 8-candidate FillModel sweep. DatabentoBacktestBroker
# delivers real L1/L2; fill probability is decided there at place_limit_
# order time. Disabling avoids the O(N log N) sort_sides() per match
# that wedged earlier 100k-step backtests.
synthetic_fill_model=false
# Cross immediately at the real L1 ask so the buy actually fills and
# the sell-side path runs. With "mid" the limit sits at the midpoint
# and only crosses when the L1 ask drops to mid - rarely happens in a
# 4-5 day window for non-trivial spreads.
entry_limit_mode=ask
# Auto-cap engine.step loop to the broker's max replay-step count so
# we don't run far past the data window's end on a frozen L1/L2.
steps_auto_from_broker=true
# L1-mid-change-driven Hawkes proxy. When > 0, fires a Hawkes event
# each time mid moves by at least this many bps relative to the last
# firing. Cheap stand-in for real trade events until the
# trades-from-MBP-10 #todo lands. 2.5 bps catches notable moves on
# liquid US large-caps.
hawkes_mid_change_threshold_bps=2.5
max_orders_per_run=1
max_orders_per_symbol=1
order_qty=0
max_order_qty=0
max_notional_per_order=0

[entry_strategy]
# Ornstein-Uhlenbeck mean-reversion gate, ON for backtest. Preferred to set
# ou_halflife_seconds (wall-clock-consistent across symbols); the legacy
# ou_window_size remains usable as a fallback.
ou_halflife_seconds=1800
ou_window_size=0
ou_buy_threshold_pct=0.0
# DatabentoBacktestBroker does not produce trade events for the
# subscribe_trades / drain_trades path; Hawkes stays on the synthetic clock
# in backtest mode. Leave this off here.
hawkes_use_real_trades=false
# Empirical "+target_pct hit-count" tilt: count windows of horizon seconds
# where mid moved up by at least hit_count_target_pct, then tilt ranking
# score by (hit_count / baseline) clamped to [tilt_min, tilt_max]. Off by
# default; enable below to calibrate on the backtest.
hit_count_enabled=false
hit_count_target_pct=0.008
hit_count_horizon_seconds=60
hit_count_baseline=5
hit_count_tilt_min=1.0
hit_count_tilt_max=3.0

[sell_strategy]
target_profit_pct=0.008
min_sell_execution_score=0

[costs]
commission_per_share=0.005
half_spread_cost=0.0005
impact_coefficient=0.1
assumed_daily_volume=1000000
daily_energy_kwh=0
energy_cost_per_kwh=0
daily_inflation_cost=0
expected_daily_shares=1

[databento]
databento_cache_dir=data/databento
databento_python=python
databento_l1_download_script=scripts/local_l1_csv_provider.py
databento_l2_download_script=scripts/databento_download_l2.py
# Local/external L1 CSV directory. Databento is used only for L2 sell windows.
databento_l1_dataset=data/l1
databento_l2_dataset=XNAS.ITCH
databento_l1_schema=mbp-1
databento_l2_schema=mbp-10
# Set a short range for the first data smoke. Later, use narrow L2 sell windows.
databento_start=2025-01-02T14:30:00Z
databento_end=2025-01-02T14:35:00Z
