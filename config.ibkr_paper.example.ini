[runtime]
universe_size=1
top_k=1
steps=1

[broker]
# Use this only while logged into IB Gateway/TWS in paper trading mode.
# IB Gateway paper default: 4002. TWS paper default: 7497.
mode=ibkr_paper
host=127.0.0.1
paper_port=4002
live_port=4001
client_id=9201

[execution]
# Notional-driven sizing: target $500 per trade, $1500 account budget.
# qty per buy = floor(trade_notional / limit_price); symbols whose price
# exceeds trade_notional are skipped. Budget gates total pending+open
# notional across the universe.
order_enabled=true
trade_notional=500
account_budget=1500
max_open_symbols=3
max_orders_per_run=1
max_orders_per_symbol=1
# Legacy fixed-share knobs. Leave order_qty=0 to use notional sizing only;
# set non-zero to fall back to fixed-share semantics (capped by max_order_qty).
order_qty=0
max_order_qty=0
max_notional_per_order=0

[sell_strategy]
# Sell exits target net +0.8%; estimated costs are added on top of this target.
target_profit_pct=0.008
min_sell_execution_score=0

[costs]
commission_per_share=0.005
half_spread_cost=0.0005
impact_coefficient=0.1
assumed_daily_volume=1000000
# Optional daily operating/capital allocation. Leave zero until calibrated.
daily_energy_kwh=0
energy_cost_per_kwh=0
daily_inflation_cost=0
expected_daily_shares=1
