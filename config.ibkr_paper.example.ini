[runtime]
top_k=1
steps=1

[broker]
# Use this only while logged into IB Gateway/TWS in paper trading mode.
# IB Gateway paper default: 4002. TWS paper default: 7497.
mode=ibkr_paper
host=127.0.0.1
paper_port=4002
live_port=4001
client_id=9201
allow_nonstandard_ibkr_paper_port=false

[execution]
# Keep this small while validating the live execution engine against IBKR paper.
order_enabled=true
order_qty=1
max_order_qty=1
max_notional_per_order=500
max_orders_per_run=1
max_orders_per_symbol=1
