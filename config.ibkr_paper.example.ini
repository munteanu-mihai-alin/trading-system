[runtime]
universe_size=1
top_k=1
steps=1

[broker]
# Use this only while logged into IB Gateway/TWS in paper trading mode.
# IB Gateway paper default: 4002. TWS paper default: 7497.
mode=ibkr_paper
host=127.0.0.1
paper_port=4002
live_port=4001
client_id=9201

[execution]
# Notional-driven sizing: target $500 per trade, $1500 account budget.
# qty per buy = floor(trade_notional / limit_price); symbols whose price
# exceeds trade_notional are skipped. Budget gates total pending+open
# notional across the universe.
order_enabled=true
trade_notional=500
account_budget=1500
# Position-sizing rule. "equal" (default) gives every active symbol
# trade_notional. "score_weighted" divides account_budget proportionally to
# each active symbol's ranking score (after tilts).
position_sizing_rule=equal
max_open_symbols=3
# RankingEngine synthetic shadow-portfolio block. Off in live: the
# sine-wave PnL trace, the shadow_results.csv writes, and the cooldown
# multiplier are not part of real trading.
shadow_enabled=false
max_orders_per_run=1
max_orders_per_symbol=1
# Legacy fixed-share knobs. Leave order_qty=0 to use notional sizing only;
# set non-zero to fall back to fixed-share semantics (capped by max_order_qty).
order_qty=0
max_order_qty=0
max_notional_per_order=0

[entry_strategy]
# Ornstein-Uhlenbeck mean-reversion gate. Two parameterisations:
#   - ou_halflife_seconds > 0 (preferred): dt-weighted EWMA, half-life in
#     wall-clock seconds. Consistent across symbols of different rates.
#   - ou_window_size > 0 (legacy): sample-count EWMA, alpha=1/window_size.
# Both zero = gate disabled. ou_buy_threshold_pct shifts the gate:
# 0 = buy at-or-below mean, +0.005 = allow up to 50 bps above mean,
# -0.005 = require entries at least 50 bps below mean.
ou_halflife_seconds=0
ou_window_size=0
ou_buy_threshold_pct=0
# When true, LiveExecutionEngine subscribes to IBKR AllLast trade prints
# (reqTickByTickData) and drives Stock::hawkes from real trade activity.
# Requires the AllLast subscription to be permitted by the IBKR market-data
# subscriptions on this account. Default off until that is confirmed.
hawkes_use_real_trades=false
# Empirical "+target_pct hit-count" buy-side ranking tilt. Off by default;
# calibrate via backtest before enabling here. See databento config example.
hit_count_enabled=false
hit_count_target_pct=0.008
hit_count_horizon_seconds=60
hit_count_baseline=5
hit_count_tilt_min=1.0
hit_count_tilt_max=3.0

[sell_strategy]
# Sell exits target net +0.8%; estimated costs are added on top of this target.
target_profit_pct=0.008
min_sell_execution_score=0

[costs]
commission_per_share=0.005
half_spread_cost=0.0005
impact_coefficient=0.1
assumed_daily_volume=1000000
# Optional daily operating/capital allocation. Leave zero until calibrated.
daily_energy_kwh=0
energy_cost_per_kwh=0
daily_inflation_cost=0
expected_daily_shares=1
